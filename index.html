<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wattscope</title>

    <!-- Appliquer le theme avant le rendu pour eviter le flash -->
    <script>
        const theme = localStorage.getItem('wattscope-theme') || 'light';
        if (theme === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>

    <!-- D3.js v7 via CDN -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>

    <!-- Variables CSS pour les couleurs des charts D3 -->
    <style>
        :root {
            --ws-primary: #0f4c5c;
            --ws-base: #94a3b8;
            --ws-accent: #e76f51;
            --ws-grid: #e5e7eb;
            --ws-text: #1e293b;
            --ws-muted: #64748b;
        }
        html.dark {
            --ws-primary: #5eead4;
            --ws-base: #64748b;
            --ws-accent: #fb923c;
            --ws-grid: #334155;
            --ws-text: #f1f5f9;
            --ws-muted: #94a3b8;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-950 min-h-screen p-6 transition-colors duration-300">

    <!-- En-tete : titre + boutons -->
    <div class="flex items-center gap-3 mb-6">
        <h1 class="text-3xl font-bold text-slate-800 dark:text-slate-100">Wattscope</h1>
        <button id="toggle-ai-btn"
            class="px-3 py-1.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium transition">
            Analyser Courbe
        </button>
        <button id="toggle-hm-ai-btn"
            class="px-3 py-1.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium transition">
            Analyser Heatmap
        </button>
        <button id="theme-toggle"
            class="ml-auto px-3 py-1.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium transition">
            Mode sombre
        </button>
    </div>

    <!-- Layout flex : chart a gauche, panneau IA courbe a droite -->
    <div class="flex gap-6 mb-6">
        <div class="flex-1 bg-white dark:bg-slate-900 rounded-lg shadow p-4 transition-colors duration-300">
            <div id="chart"></div>
        </div>

        <!-- Panneau IA courbe -->
        <div id="ai-panel" class="w-80 bg-white dark:bg-slate-900 rounded-lg shadow p-4 hidden transition-colors duration-300">
            <div class="flex items-center gap-2 mb-3">
                <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <h2 class="text-sm font-semibold text-slate-700 dark:text-slate-200">Analyse IA — Courbe</h2>
            </div>
            <div id="ai-analysis" class="text-xs text-slate-600 dark:text-slate-300 leading-relaxed">
                <p class="text-slate-400 dark:text-slate-500 italic">En attente...</p>
            </div>
        </div>
    </div>

    <!-- Layout flex : heatmap a gauche, panneau IA heatmap a droite -->
    <div class="flex gap-6">
        <div class="flex-1 bg-white dark:bg-slate-900 rounded-lg shadow p-4 transition-colors duration-300">
            <div id="heatmap"></div>
        </div>

        <!-- Panneau IA heatmap -->
        <div id="hm-ai-panel" class="w-80 bg-white dark:bg-slate-900 rounded-lg shadow p-4 hidden transition-colors duration-300">
            <div class="flex items-center gap-2 mb-3">
                <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <h2 class="text-sm font-semibold text-slate-700 dark:text-slate-200">Analyse IA — Heatmap</h2>
            </div>
            <div id="hm-ai-analysis" class="text-xs text-slate-600 dark:text-slate-300 leading-relaxed">
                <p class="text-slate-400 dark:text-slate-500 italic">En attente...</p>
            </div>
        </div>
    </div>

    <!-- Tooltip -->
    <div id="tooltip" class="absolute pointer-events-none opacity-0 transition-opacity duration-150 bg-slate-800 dark:bg-slate-900 text-white text-xs rounded-lg px-3 py-2 shadow-lg z-50">
    </div>

    <!-- Theme toggle logic -->
    <script>
        const themeBtn = document.getElementById('theme-toggle');

        function updateThemeButtonLabel() {
            const isDark = document.documentElement.classList.contains('dark');
            themeBtn.textContent = isDark ? 'Mode clair' : 'Mode sombre';
        }

        themeBtn.addEventListener('click', () => {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('wattscope-theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('wattscope-theme', 'dark');
            }
            updateThemeButtonLabel();
            // Notifier main.js du changement de theme
            window.dispatchEvent(new Event('wattscope-themechange'));
        });

        updateThemeButtonLabel();
    </script>

    <script src="js/main.js"></script>
</body>
</html>
